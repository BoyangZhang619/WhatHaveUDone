<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>跨域登录 + 文本</title>
  <style>
    body { font-family: system-ui; max-width: 900px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin: 12px 0; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    textarea { min-height: 140px; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; cursor: pointer; }
    button.primary { background: #111; color: #fff; }
    button.ghost { background: #f3f3f3; }
    .muted { color: #666; font-size: 12px; }
    .error { color: #b00020; }
    .ok { color: #0b6; }
    pre { white-space: pre-wrap; background: #fafafa; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>跨域（Pages → workers.dev）Session 登录</h2>
  <p class="muted">要求 Worker 支持 CORS + Set-Cookie SameSite=None + credentials</p>

  <div class="card">
    <h3>账户</h3>
    <label>Email</label>
    <input id="email" placeholder="test@test.com" />
    <label style="margin-top:10px; display:block;">Password</label>
    <input id="password" type="password" placeholder="123456" />
    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="ghost" id="btnRegister">注册</button>
      <button class="primary" id="btnLogin">登录</button>
      <button class="ghost" id="btnLogout">登出</button>
      <button class="ghost" id="btnMe">我是谁</button>
    </div>
    <div id="authStatus" class="muted"></div>
  </div>

  <div class="card">
    <h3>新建文本</h3>
    <label>标题</label>
    <input id="title" placeholder="标题（可空）" />
    <label style="margin-top:10px; display:block;">内容</label>
    <textarea id="content" placeholder="输入正文..."></textarea>
    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="primary" id="btnCreate">保存</button>
      <button class="ghost" id="btnList">刷新列表</button>
    </div>
    <div id="postStatus" class="muted"></div>
  </div>

  <div class="card">
    <h3>列表</h3>
    <div id="list" class="muted">未加载</div>
    <div id="detail"></div>
  </div>

<script>
  // ✅ 跨域：明确写 API 域名
  const API_BASE = "https://login.boyangzhang246.workers.dev";

  async function api(path, options = {}) {
    const res = await fetch(API_BASE + path, {
      ...options,
      headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      credentials: "include", // ✅ 关键：让浏览器带上跨域 cookie
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = { raw: text }; }
    if (!res.ok) throw { status: res.status, data };
    return data;
  }

  const $ = (id) => document.getElementById(id);

  function setStatus(el, msg, kind="muted") {
    el.className = kind;
    el.textContent = msg;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  async function refreshMe() {
    try {
      const data = await api("/api/me");
      setStatus($("authStatus"), "已登录：" + data.user.email, "ok");
      return data.user;
    } catch (e) {
      setStatus($("authStatus"), "未登录 / 会话失效", "muted");
      return null;
    }
  }

  async function listPosts() {
    try {
      const data = await api("/api/posts?limit=20&offset=0");
      const items = data.results || [];
      if (!items.length) {
        $("list").innerHTML = "<p class='muted'>暂无内容</p>";
        return;
      }
      $("list").innerHTML =
        "<ul>" +
        items.map(p =>
          `<li>
            <b>#${p.id}</b> ${escapeHtml(p.title || "(无标题)")}
            <button class="ghost" onclick="viewPost(${p.id})">查看</button>
            <div class="muted">${escapeHtml(p.preview || "")}</div>
          </li>`
        ).join("") +
        "</ul>";
    } catch (e) {
      $("list").innerHTML = `<p class="error">加载失败：${escapeHtml(JSON.stringify(e.data))}</p>`;
    }
  }

  window.viewPost = async function(id) {
    try {
      const data = await api("/api/posts/" + id);
      $("detail").innerHTML = `<h4>内容 #${id}</h4><pre>${escapeHtml(data.post.content || "")}</pre>`;
    } catch (e) {
      $("detail").innerHTML = `<p class="error">读取失败：${escapeHtml(JSON.stringify(e.data))}</p>`;
    }
  };

  $("btnRegister").onclick = async () => {
    setStatus($("authStatus"), "注册中...");
    try {
      await api("/api/register", {
        method: "POST",
        body: JSON.stringify({ email: $("email").value, password: $("password").value })
      });
      setStatus($("authStatus"), "注册成功（现在可以登录）", "ok");
    } catch (e) {
      setStatus($("authStatus"), "注册失败：" + JSON.stringify(e.data), "error");
    }
  };

  $("btnLogin").onclick = async () => {
    setStatus($("authStatus"), "登录中...");
    try {
      await api("/api/login", {
        method: "POST",
        body: JSON.stringify({ email: $("email").value, password: $("password").value })
      });
      await refreshMe();
      await listPosts();
    } catch (e) {
      setStatus($("authStatus"), "登录失败：" + JSON.stringify(e.data), "error");
    }
  };

  $("btnLogout").onclick = async () => {
    try { await api("/api/logout", { method: "POST" }); } catch {}
    await refreshMe();
    await listPosts();
  };

  $("btnMe").onclick = refreshMe;

  $("btnCreate").onclick = async () => {
    setStatus($("postStatus"), "保存中...");
    try {
      const data = await api("/api/posts", {
        method: "POST",
        body: JSON.stringify({ title: $("title").value, content: $("content").value })
      });
      setStatus($("postStatus"), "已保存 id=" + data.id, "ok");
      $("content").value = "";
      await listPosts();
    } catch (e) {
      setStatus($("postStatus"), "保存失败：" + JSON.stringify(e.data), "error");
    }
  };

  $("btnList").onclick = listPosts;

  // 初始
  refreshMe();
  listPosts();
</script>
</body>
</html>
