<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>跨域登录 + 文本</title>
  <link rel="stylesheet" href="./main.css">
</head>

<body>
  <h2>跨域（Pages → workers.dev）Session 登录</h2>
  <p class="muted">要求 Worker 支持 CORS + Set-Cookie SameSite=None + credentials</p>

  <div class="card">
    <h3>账户</h3>
    <label>Email</label>
    <input id="email" placeholder="test@test.com" />
    <label style="margin-top:10px; display:block;">Password</label>
    <input id="password" type="password" placeholder="123456" />
    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="ghost" id="btnRegister">注册</button>
      <button class="primary" id="btnLogin">登录</button>
      <button class="ghost" id="btnLogout">登出</button>
      <button class="ghost" id="btnMe">我是谁</button>
    </div>
    <div id="authStatus" class="muted"></div>
  </div>

  <div class="card">
    <h3>新建文本</h3>
    <label>标题</label>
    <input id="title" placeholder="标题（可空）" />
    <label style="margin-top:10px; display:block;">内容</label>
    <textarea id="content" placeholder="输入正文..."></textarea>
    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="primary" id="btnCreate">保存</button>
      <button class="ghost" id="btnList">刷新列表</button>
    </div>
    <div id="postStatus" class="muted"></div>
  </div>

  <div class="card">
    <h3>列表</h3>
    <div id="list" class="muted">未加载</div>
    <div id="detail"></div>
  </div>

  <script src="./main.js"></script>
</body>

</html>
